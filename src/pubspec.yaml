name: skillet_player
description: Dark minimalist local music player.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  on_audio_query: ^3.2.0
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.13
  permission_handler: ^11.3.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0B0B0D"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21
